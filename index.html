<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZipperFlow - Premium Zipper Work order & Management System</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
  <!-- Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>

<body class="dark-theme">
  <!-- Page Loader -->
  <div id="loader" class="loader-wrapper">
    <div class="spinner"></div>
  </div>

  <!-- Main Application Wrapper -->
  <div id="app-container" class="app-layout">

    <!-- Sidebar Navigation (Desktop) -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="brand-logo">
          <img src="zipper-slider.svg" alt="ZipperFlow Logo" class="logo-img">
        </div>
        <span class="brand-name">ZipperFlow</span>
      </div>

      <nav class="sidebar-menu">
        <button class="nav-item active" data-target="landing">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
            <polyline points="9 22 9 12 15 12 15 22" />
          </svg>
          <span>Home Page</span>
        </button>
        <button class="nav-item" data-target="dashboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="9" />
            <rect x="14" y="3" width="7" height="5" />
            <rect x="14" y="12" width="7" height="9" />
            <rect x="3" y="16" width="7" height="5" />
          </svg>
          <span>Dashboard</span>
        </button>
        <button class="nav-item" data-target="inventory">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path
              d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" />
            <polyline points="3.27 6.96 12 12.01 20.73 6.96" />
            <line x1="12" y1="22.08" x2="12" y2="12" />
          </svg>
          <span>Inventory</span>
        </button>
        <button class="nav-item" data-target="accounting">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="1" x2="12" y2="23" />
            <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
          </svg>
          <span>Accounting</span>
        </button>
        <button class="nav-item" data-target="workshop">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path
              d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z" />
          </svg>
          <span>Workshop Portal</span>
        </button>
      </nav>

      <div class="sidebar-footer">
        <button id="theme-toggle" class="theme-btn" title="Toggle Theme">
          <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5" />
            <line x1="12" y1="1" x2="12" y2="3" />
            <line x1="12" y1="21" x2="12" y2="23" />
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
            <line x1="1" y1="12" x2="3" y2="12" />
            <line x1="21" y1="12" x2="23" y2="12" />
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
          </svg>
          <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
          </svg>
          <span class="theme-text">Light Mode</span>
        </button>
      </div>
    </aside>

    <!-- Main Content Container -->
    <main class="main-content">
      <!-- Top Bar for mobile / general headers -->
      <header class="top-bar">
        <button class="menu-toggle" id="menu-toggle" aria-label="Toggle Menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="12" x2="21" y2="12" />
            <line x1="3" y1="6" x2="21" y2="6" />
            <line x1="3" y1="18" x2="21" y2="18" />
          </svg>
        </button>
        <div class="mobile-logo">
          <div class="brand-logo">
            <img src="zipper-slider.svg" alt="ZipperFlow Logo" class="logo-img">
          </div>
          <span id="mobile-page-title">ZipperFlow</span>
        </div>
        <div class="top-bar-right">
          <span class="status-indicator">
            <span class="indicator-dot online"></span>
            <span class="indicator-label">Offline System</span>
          </span>
          <button class="portal-btn" id="portal-access-btn" data-target="dashboard">
            Admin Panel
          </button>
        </div>
      </header>

      <!-- VIEW: Landing Page -->
      <section id="view-landing" class="app-view active">
        <!-- Landing page content is dynamically injected and highly interactive -->
      </section>

      <!-- VIEW: Dashboard -->
      <section id="view-dashboard" class="app-view hidden">
        <!-- Dashboard page content -->
      </section>

      <!-- VIEW: Inventory -->
      <section id="view-inventory" class="app-view hidden">
        <!-- Inventory management content -->
      </section>

      <!-- VIEW: Accounting -->
      <section id="view-accounting" class="app-view hidden">
        <!-- Accounting management content -->
      </section>

      <!-- VIEW: Workshop -->
      <section id="view-workshop" class="app-view hidden">
        <!-- Workshop & Capacity content -->
      </section>

    </main>

    <!-- Bottom Navigation (Mobile Only) -->
    <nav class="bottom-nav">
      <button class="bottom-nav-item active" data-target="landing">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
        </svg>
        <span>Home</span>
      </button>
      <button class="bottom-nav-item" data-target="dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="9" />
          <rect x="14" y="12" width="7" height="9" />
        </svg>
        <span>Dashboard</span>
      </button>
      <button class="bottom-nav-item" data-target="inventory">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4z" />
        </svg>
        <span>Stock</span>
      </button>
      <button class="bottom-nav-item" data-target="accounting">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="12" y1="1" x2="12" y2="23" />
          <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
        </svg>
        <span>Finance</span>
      </button>
      <button class="bottom-nav-item" data-target="workshop">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77" />
        </svg>
        <span>Work</span>
      </button>
    </nav>

  </div>

  <!-- Application Script -->
  <script src="app.js" type="module"></script>
</body>

</html>
